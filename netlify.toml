# Cloudflare Pages / Netlify 配置
[build]
command = "npm run build"
publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Netlify Identity API 端点重定向
[[redirects]]
  from = "/.netlify/identity/*"
  to = "https://eclectic-zuccutto-65eed7.netlify.app/.netlify/identity/:splat"
  status = 200
  force = true

# 确保 /admin/ 路径正确处理
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
